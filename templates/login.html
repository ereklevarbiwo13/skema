{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card">
      <div class="card-body">
        <h2 class="mb-4">შესვლა</h2>
        <form method="post">
          {{ form.hidden_tag() }}
          <div class="form-group">
            {{ form.username.label }}
            {{ form.username(class="form-control") }}
          </div>
          <div class="form-group">
            {{ form.password.label }}
            {{ form.password(class="form-control") }}
          </div>
          {{ form.submit(class="btn btn-primary btn-block") }}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
